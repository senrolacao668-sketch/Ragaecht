<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DiamanteBlack 💎</title>
<style>
  /* ── Tokens cyberpunk ── */
  :root {
    --bg:        #0a0a0f;
    --bg2:       #12121a;
    --bg3:       #1a1a2e;
    --neon:      #b44fff;
    --neon2:     #7f00ff;
    --cyan:      #00f0ff;
    --pink:      #ff2d78;
    --text:      #e8e0f8;
    --muted:     #6b6080;
    --bubble-in: #1e1e30;
    --bubble-out:#2a1540;
    --border:    #2e2060;
    --radius:    18px;
    --font-ui:   'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--neon2); border-radius: 4px; }

  /* ── Neon glow util ── */
  .glow  { text-shadow: 0 0 8px var(--neon), 0 0 22px var(--neon2); }
  .glow-c{ text-shadow: 0 0 8px var(--cyan), 0 0 20px var(--cyan); }

  /* ════ HEADER ════ */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon2), var(--cyan), var(--pink));
  }
  .logo {
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--neon), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    -webkit-text-fill-color: var(--muted);
  }
  .hbtn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    padding: 6px;
    transition: color .2s;
  }
  .hbtn:hover { color: var(--neon); }
  .hbtns { display: flex; gap: 4px; }

  /* ════ CHAT AREA ════ */
  #chatArea {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(127,0,255,.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 90%, rgba(0,240,255,.04) 0%, transparent 50%);
  }

  /* ── Bubbles ── */
  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    line-height: 1.55;
    font-size: 0.93rem;
    word-break: break-word;
    position: relative;
  }
  .bubble-in {
    background: var(--bubble-in);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    align-self: flex-start;
  }
  .bubble-in::before {
    content: '';
    position: absolute;
    top: 0; left: -1px;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--neon), var(--neon2));
    border-radius: 3px 0 0 3px;
  }
  .bubble-out {
    background: var(--bubble-out);
    border: 1px solid rgba(180,79,255,.3);
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    align-self: flex-end;
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.72rem;
    cursor: pointer;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color .2s;
  }
  .copy-btn:hover { color: var(--cyan); }

  /* score tag */
  .score-tag {
    font-size: 0.65rem;
    color: var(--neon);
    opacity: .7;
    margin-top: 4px;
  }

  /* thinking */
  .thinking {
    color: var(--muted);
    font-style: italic;
    font-size: .88rem;
    align-self: flex-start;
    padding: 10px 14px;
    background: var(--bg2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

  /* image / audio / file */
  .bubble img { border-radius: 12px; max-width: 100%; margin-top: 4px; }
  .audio-wrap { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .audio-wrap audio { width: 100%; }
  .file-link { color: var(--cyan); text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .file-link:hover { text-decoration: underline; }

  /* ════ FOOTER ════ */
  footer {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 760px;
    margin: 0 auto;
  }
  .input-box {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    transition: border-color .2s;
  }
  .input-box:focus-within { border-color: var(--neon2); }
  #messageInput {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 0.95rem;
    resize: none;
    max-height: 120px;
    field-sizing: content;
    font-family: var(--font-ui);
  }
  #messageInput::placeholder { color: var(--muted); }

  .ftn-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 8px;
    font-size: 1.2rem;
    transition: color .2s, transform .15s;
  }
  .ftn-btn:hover { color: var(--neon); transform: scale(1.15); }

  .send-btn {
    background: linear-gradient(135deg, var(--neon2), var(--pink));
    border: none;
    border-radius: 50%;
    width: 44px; height: 44px;
    color: #fff;
    cursor: pointer;
    font-size: 1rem;
    transition: transform .15s, box-shadow .2s;
    flex-shrink: 0;
  }
  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 14px var(--neon);
  }

  /* ════ PANELS / OVERLAYS ════ */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 50;
    display: none;
  }
  .overlay.show { display: flex; }

  /* side panel */
  .side-panel {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    width: 300px;
    height: 100%;
    padding: 24px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .panel-title {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, var(--neon), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .menu-item {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 12px 14px;
    border-radius: 12px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .95rem;
    transition: background .2s, color .2s;
  }
  .menu-item:hover { background: var(--bg3); color: var(--neon); }
  .menu-item .ico { font-size: 1.1rem; width: 22px; text-align: center; }

  /* right panel (folders / config) */
  .right-panel {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    width: min(360px, 100vw);
    height: 100%;
    margin-left: auto;
    padding: 24px 20px;
    overflow-y: auto;
  }
  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    transition: color .2s;
  }
  .close-btn:hover { color: var(--pink); }

  /* centered modal */
  .modal-center {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: min(360px, 92vw);
    margin: auto;
    position: relative;
  }

  /* generic card */
  .card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }

  /* action button */
  .action-btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 13px;
    cursor: pointer;
    font-size: .92rem;
    font-weight: 600;
    transition: opacity .2s, box-shadow .2s;
    margin-bottom: 10px;
  }
  .action-btn:hover { opacity: .85; }
  .btn-purple { background: linear-gradient(135deg, var(--neon2), var(--neon)); color: #fff; }
  .btn-cyan   { background: linear-gradient(135deg, #007aaa, var(--cyan)); color: #000; }
  .btn-red    { background: linear-gradient(135deg, #7a0020, var(--pink)); color: #fff; }
  .btn-yellow { background: linear-gradient(135deg, #6b4f00, #ffd700); color: #000; }

  /* toggle */
  .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .toggle-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--neon); cursor: pointer; }

  /* folder card */
  .folder-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--neon2);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .folder-card h4 { font-weight: 700; font-size: .95rem; }
  .folder-card p  { font-size: .75rem; color: var(--muted); margin-top: 2px; }

  /* search highlight */
  mark { background: rgba(180,79,255,.3); color: var(--neon); border-radius: 3px; padding: 0 2px; }

  /* recording pulse */
  @keyframes rec { 0%,100%{box-shadow:0 0 0 0 rgba(255,45,120,.7)} 50%{box-shadow:0 0 0 10px rgba(255,45,120,0)} }
  .recording { animation: rec 1s ease-in-out infinite; }
</style>
</head>
<body>

<!-- ════════════════════ SCRIPT ════════════════════ -->
<script>
/* ══════════════════════════════════════════════════
   ESTADO GLOBAL
══════════════════════════════════════════════════ */
let db;
let conhecimento = [];
let pastas = [];
let gravador, audioChunks = [];
let isRecording = false;
let vozAtiva   = true;
let autoLearn  = true;

/* ══════════════════════════════════════════════════
   INDEXEDDB  (v7 – schema final)
══════════════════════════════════════════════════ */
function initDB() {
  return new Promise(resolve => {
    const req = indexedDB.open('DiamanteBD', 7);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('conhecimento'))
        d.createObjectStore('conhecimento', { keyPath:'id', autoIncrement:true });
      if (!d.objectStoreNames.contains('pastas'))
        d.createObjectStore('pastas', { keyPath:'id', autoIncrement:true });
    };
    req.onsuccess = e => {
      db = e.target.result;
      Promise.all([carregarConhecimento(), carregarPastas()]).then(resolve);
    };
    req.onerror = () => resolve();
  });
}

function idbAll(store) {
  return new Promise(resolve => {
    const tx = db.transaction(store, 'readonly');
    tx.objectStore(store).getAll().onsuccess = e => resolve(e.target.result || []);
  });
}
function idbAdd(store, item) {
  return new Promise(resolve => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).add(item);
    req.onsuccess = e => resolve(e.target.result);
  });
}
function idbDelete(store, id) {
  return new Promise(resolve => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(id).onsuccess = resolve;
  });
}

async function carregarConhecimento() {
  conhecimento = await idbAll('conhecimento');
}
async function carregarPastas() {
  pastas = await idbAll('pastas');
  renderPastas();
}

/* ══════════════════════════════════════════════════
   TF-IDF LOCAL
══════════════════════════════════════════════════ */
function tokenize(txt) {
  return txt.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,' ')
    .split(/\s+/)
    .filter(w => w.length > 2);
}

function buildTF(tokens) {
  const freq = {};
  tokens.forEach(t => freq[t] = (freq[t]||0) + 1);
  const len = tokens.length || 1;
  const tf = {};
  Object.keys(freq).forEach(k => tf[k] = freq[k] / len);
  return tf;
}

function computeIDF(termo) {
  const n = conhecimento.length;
  if (!n) return 0;
  const df = conhecimento.filter(d => d.tf && d.tf[termo]).length;
  return Math.log((n + 1) / (df + 1)) + 1;
}

function scoreTFIDF(query, doc) {
  if (!doc.tf) return 0;
  return tokenize(query).reduce((s, t) => {
    return s + (doc.tf[t] || 0) * computeIDF(t);
  }, 0);
}

function topK(query, k = 3) {
  return conhecimento
    .map(d => ({ ...d, score: scoreTFIDF(query, d) }))
    .filter(d => d.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, k);
}

/* ══════════════════════════════════════════════════
   SALVAR CONHECIMENTO
══════════════════════════════════════════════════ */
async function salvarConhecimento(texto, tipo = 'texto') {
  if (!texto?.trim()) return;
  const tokens = tokenize(texto);
  const item = { texto, tipo, data: new Date().toISOString(), tf: buildTF(tokens) };
  const id = await idbAdd('conhecimento', item);
  item.id = id;
  conhecimento.push(item);
}

/* ══════════════════════════════════════════════════
   GERAR RESPOSTA
══════════════════════════════════════════════════ */
function gerarResposta(msg) {
  if (/^(oi|olá|ola|hey|e aí|eai|bom dia|boa tarde|boa noite)\b/i.test(msg.trim()))
    return 'Fala meu parceiro! Sistema on, base de conhecimento pronta. Manda ver! 🔥';

  if (/quantos?.*salv|quantos? registr|tamanho.*base|base.*conhecimento/i.test(msg))
    return `Base com **${conhecimento.length}** registros indexados 💎`;

  const hits = topK(msg, 3);

  if (!hits.length)
    return 'Ainda não tenho nada sobre isso na base. Mas já gravei sua mensagem pra aprender! 🚀';

  if (hits.length === 1)
    return `Encontrei isso na base (score ${hits[0].score.toFixed(3)}):\n\n"${hits[0].texto}"`;

  const trechos = hits
    .map((h, i) => `${i+1}. "${h.texto}" _(score ${h.score.toFixed(3)})_`)
    .join('\n\n');
  return `Encontrei ${hits.length} referências relevantes:\n\n${trechos}`;
}

/* ══════════════════════════════════════════════════
   RENDERIZAÇÃO DE MENSAGENS
══════════════════════════════════════════════════ */
function adicionarMensagem(texto, remetente = 'usuario', tipo = 'texto', dados = null) {
  const chat = document.getElementById('chatArea');
  const div  = document.createElement('div');
  div.className = remetente === 'usuario' ? 'bubble bubble-out' : 'bubble bubble-in';

  if (tipo === 'texto') {
    const html = texto
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/_(.*?)_/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
    div.innerHTML = `<div>${html}</div>`;
    if (remetente !== 'usuario') {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.innerHTML = '⎘ Copiar';
      btn.onclick = () => { navigator.clipboard.writeText(texto); btn.innerHTML = '✓ Copiado!'; setTimeout(()=>btn.innerHTML='⎘ Copiar',2000); };
      div.appendChild(btn);
    }
  } else if (tipo === 'imagem') {
    div.innerHTML = `<img src="${dados}" alt="imagem">`;
  } else if (tipo === 'audio') {
    div.innerHTML = `<div class="audio-wrap">🎵 <audio controls src="${dados}" style="flex:1"></audio></div>`;
  } else if (tipo === 'arquivo') {
    div.innerHTML = `<a class="file-link" href="${dados.url}" download="${dados.nome}">📄 ${dados.nome}</a>`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarPensando() {
  const chat = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.id = 'pensando';
  div.className = 'thinking';
  div.textContent = '💎 processando…';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* ══════════════════════════════════════════════════
   ENVIO
══════════════════════════════════════════════════ */
async function enviarMensagem() {
  const input = document.getElementById('messageInput');
  const texto = input.value.trim();
  if (!texto) return;

  adicionarMensagem(texto, 'usuario');
  if (autoLearn) await salvarConhecimento(texto);
  input.value = '';
  input.style.height = 'auto';

  const pensando = mostrarPensando();
  setTimeout(() => {
    pensando.remove();
    const resp = gerarResposta(texto);
    adicionarMensagem(resp, 'bot');
    if (vozAtiva) falar(resp.replace(/[*_`]/g,''));
  }, 400);
}

function enviarArquivos(arquivos) {
  for (const arq of arquivos) {
    const reader = new FileReader();
    reader.onload = async e => {
      let tipo = 'arquivo';
      if (arq.type.startsWith('image/')) tipo = 'imagem';
      else if (arq.type.startsWith('audio/')) tipo = 'audio';
      const dados = tipo === 'arquivo' ? { nome: arq.name, url: e.target.result } : e.target.result;
      adicionarMensagem(arq.name, 'usuario', tipo, dados);
      await salvarConhecimento(`Arquivo: ${arq.name}`, tipo);
    };
    reader.readAsDataURL(arq);
  }
}

/* ══════════════════════════════════════════════════
   VOZ
══════════════════════════════════════════════════ */
function falar(txt) {
  if (!vozAtiva || !txt) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt.slice(0,300));
  u.lang = 'pt-BR'; u.rate = 1.05;
  speechSynthesis.speak(u);
}

/* ══════════════════════════════════════════════════
   GRAVAÇÃO DE ÁUDIO
══════════════════════════════════════════════════ */
async function iniciarPararGravacao() {
  const btn = document.getElementById('recordBtn');
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      gravador = new MediaRecorder(stream);
      audioChunks = [];
      gravador.ondataavailable = e => audioChunks.push(e.data);
      gravador.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        adicionarMensagem('🎙️ Áudio gravado', 'usuario', 'audio', url);
        salvarConhecimento('Gravação de áudio', 'audio');
        gravador.stream.getTracks().forEach(t => t.stop());
      };
      gravador.start();
      isRecording = true;
      btn.classList.add('recording');
      btn.textContent = '⏹️';
    } catch { alert('Erro ao acessar o microfone.'); }
  } else {
    gravador.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎙️';
  }
}

/* ══════════════════════════════════════════════════
   PASTAS (persistentes)
══════════════════════════════════════════════════ */
const CORES = ['#7f00ff','#00f0ff','#ff2d78','#ffd700','#00ff9f'];

function renderPastas() {
  const el = document.getElementById('foldersList');
  if (!el) return;
  el.innerHTML = '';
  if (!pastas.length) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;margin-top:20px">Nenhuma pasta ainda</p>';
    return;
  }
  pastas.forEach(p => {
    const div = document.createElement('div');
    div.className = 'folder-card';
    div.style.borderLeftColor = p.cor || 'var(--neon2)';
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h4>${p.nome}</h4>
        <button onclick="deletarPasta(${p.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem" title="Excluir">✕</button>
      </div>
      <p>criada em ${new Date(p.data).toLocaleDateString('pt-BR')}</p>
    `;
    el.appendChild(div);
  });
}

async function criarPasta(nome) {
  if (!nome?.trim()) return;
  const p = { nome: nome.trim(), cor: CORES[pastas.length % CORES.length], data: new Date().toISOString() };
  const id = await idbAdd('pastas', p);
  p.id = id;
  pastas.push(p);
  renderPastas();
}

async function deletarPasta(id) {
  if (!confirm('Excluir esta pasta?')) return;
  await idbDelete('pastas', id);
  pastas = pastas.filter(p => p.id !== id);
  renderPastas();
}

/* ══════════════════════════════════════════════════
   MENU / UTILIDADES
══════════════════════════════════════════════════ */
function closeSideMenu()        { closeOverlay('sideMenu'); }
function closeOverlay(id)       { document.getElementById(id).classList.remove('show'); }
function openOverlay(id)        { document.getElementById(id).classList.add('show'); }

function exportarBackup() {
  const b = { conhecimento, pastas, ts: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(b, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diamante-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  closeSideMenu();
}

function importarBackup() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.conhecimento) {
          for (const item of data.conhecimento) {
            if (!item.tf) item.tf = buildTF(tokenize(item.texto));
            await salvarConhecimento(item.texto, item.tipo);
          }
        }
        if (data.pastas) {
          for (const p of data.pastas) await criarPasta(p.nome);
        }
        alert(`✅ Importados ${data.conhecimento?.length||0} registros e ${data.pastas?.length||0} pastas!`);
      } catch { alert('Arquivo inválido.'); }
    };
    reader.readAsText(e.target.files[0]);
  };
  inp.click();
  closeSideMenu();
}

function buscarNoHistorico() {
  closeSideMenu();
  openOverlay('searchPanel');
  setTimeout(() => document.getElementById('searchInput').focus(), 50);
}

function executarBusca() {
  const q = document.getElementById('searchInput').value.trim();
  const out = document.getElementById('searchResults');
  out.innerHTML = '';
  if (!q) return;
  const hits = topK(q, 10);
  if (!hits.length) {
    out.innerHTML = '<p style="color:var(--muted);text-align:center">Nada encontrado.</p>';
    return;
  }
  hits.forEach(h => {
    const div = document.createElement('div');
    div.className = 'card';
    const hl = h.texto.replace(new RegExp(q,'gi'), m => `<mark>${m}</mark>`);
    div.innerHTML = `
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:4px">${new Date(h.data).toLocaleString('pt-BR')} · score ${h.score.toFixed(3)}</div>
      <div>${hl}</div>
    `;
    out.appendChild(div);
  });
}

function verEstatisticas() {
  closeSideMenu();
  const tipos = {};
  conhecimento.forEach(k => tipos[k.tipo] = (tipos[k.tipo]||0) + 1);
  const linhas = Object.entries(tipos).map(([t,n]) => `${t}: ${n}`).join('\n');
  alert(`📊 Estatísticas\n\nTotal de registros: ${conhecimento.length}\nPastas: ${pastas.length}\n\nPor tipo:\n${linhas||'—'}`);
}

function mostrarAjuda() {
  closeSideMenu();
  alert(
    '💎 DiamanteBlack v2.0\n\n' +
    '🧠 Motor RAG TF-IDF — 100% offline\n' +
    '📁 Pastas persistentes no IndexedDB\n' +
    '💾 Export/Import backup JSON\n' +
    '🎤 Gravação de áudio\n' +
    '📎 Envio de arquivos e imagens\n' +
    '🔍 Busca com score por relevância\n\n' +
    'Tudo fica salvo no seu navegador.\n' +
    'Nenhum dado sai do seu dispositivo.'
  );
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
window.addEventListener('load', async () => {
  await initDB();

  const inp = document.getElementById('messageInput');
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
  });

  document.getElementById('sendBtn').addEventListener('click', enviarMensagem);
  document.getElementById('attachBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', e => { enviarArquivos(e.target.files); e.target.value=''; });
  document.getElementById('recordBtn').addEventListener('click', iniciarPararGravacao);

  document.getElementById('menuBtn').addEventListener('click', () => openOverlay('sideMenu'));
  document.getElementById('foldersBtn').addEventListener('click', () => openOverlay('foldersPanel'));
  document.getElementById('closeFolders').addEventListener('click', () => closeOverlay('foldersPanel'));
  document.getElementById('configBtn').addEventListener('click', () => openOverlay('configPanel'));
  document.getElementById('closeConfig').addEventListener('click', () => closeOverlay('configPanel'));

  document.getElementById('newFolderBtn').addEventListener('click', () => {
    const nome = prompt('Nome da pasta:');
    criarPasta(nome);
  });

  document.getElementById('limparChatBtn').addEventListener('click', () => {
    if (!confirm('Limpar o chat?')) return;
    document.getElementById('chatArea').innerHTML = '';
    closeOverlay('configPanel');
    adicionarMensagem('Chat limpo. Sistema online 🔥', 'bot');
  });
  document.getElementById('limparTudoBtn').addEventListener('click', () => {
    if (!confirm('Apagar TODO o conhecimento salvo? Isso não pode ser desfeito.')) return;
    indexedDB.deleteDatabase('DiamanteBD');
    location.reload();
  });
  document.getElementById('usarVoz').addEventListener('change', e => vozAtiva = e.target.checked);
  document.getElementById('autoLearn').addEventListener('change', e => autoLearn = e.target.checked);

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); executarBusca(); }
  });

  adicionarMensagem(
    `Sistema online ⚡ Base carregada com **${conhecimento.length}** registros.\nManda textos, arquivos ou áudio — tudo fica indexado localmente com TF-IDF.\nNenhum dado sai do seu dispositivo. 💎`,
    'bot'
  );
});
</script>
