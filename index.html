<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Reggae - Seu Assistente Pessoal</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet"> <script> tailwind.config = { theme: { extend: { colors: { primary: '#075E54', secondary: '#128C7E', incoming: '#FFFFFF', outgoing: '#DCF8C6', background: '#E5DDD5', } } } } </script> <style> .chat-bubble-in { @apply bg-white rounded-3xl rounded-tl-none p-4 max-w-[82%] shadow-md break-words; } .chat-bubble-out { @apply bg-outgoing rounded-3xl rounded-tr-none p-4 max-w-[82%] shadow-md ml-auto break-words; } .audio-player { @apply flex items-center gap-3 bg-gray-100 rounded-2xl p-3 my-2 w-full max-w-xs shadow-sm; } </style> </head> <body class="bg-background font-sans text-gray-800 min-h-screen flex flex-col"> <header class="bg-primary text-white p-4 shadow-md sticky top-0 z-10"> <div class="flex items-center justify-between"> <div class="flex items-center gap-3"> <button id="menuBtn" class="text-2xl hover:scale-110 transition"><i class="fa fa-bars"></i></button> <div> <h1 class="text-2xl font-bold">Reggae 🤖</h1> <p class="text-xs opacity-75 -mt-1">Sempre em movimento</p> </div> </div> <div class="flex gap-5 text-xl"> <button id="foldersBtn"><i class="fa fa-folder-open"></i></button> <button id="configBtn"><i class="fa fa-cog"></i></button> </div> </div> </header> <main id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24"></main> <footer class="bg-white border-t p-3 sticky bottom-0 z-10"> <div class="max-w-3xl mx-auto flex items-end gap-2"> <button id="attachBtn" class="p-3 text-gray-600 hover:text-secondary"><i class="fa fa-paperclip text-2xl"></i></button> <input type="file" id="fileInput" multiple class="hidden"> <div class="flex-1 bg-gray-100 rounded-3xl px-5 py-2"> <textarea id="messageInput" rows="1" class="w-full bg-transparent outline-none resize-none text-base" placeholder="Digite uma mensagem..."></textarea> </div> <button id="recordBtn" class="p-3 text-gray-600 hover:text-red-500"><i class="fa fa-microphone text-2xl"></i></button> <button id="sendBtn" class="bg-secondary hover:bg-primary text-white p-4 rounded-3xl"><i class="fa fa-paper-plane"></i></button> </div> </footer> <!-- Menu Lateral --> <div id="sideMenu" class="fixed inset-0 bg-black/70 hidden z-50"> <div class="bg-white w-80 h-full ml-auto shadow-2xl p-6 overflow-y-auto"> <div class="flex justify-between mb-8"> <h2 class="text-3xl font-bold text-primary">Menu Reggae</h2> <button onclick="closeSideMenu()" class="text-3xl text-gray-400 hover:text-gray-600">✕</button> </div> <div class="space-y-2"> <button onclick="exportarBackup()" class="w-full text-left px-4 py-4 hover:bg-gray-100 rounded-2xl flex items-center gap-3"><i class="fa fa-download"></i> Exportar Backup</button> <button onclick="buscarNoHistorico()" class="w-full text-left px-4 py-4 hover:bg-gray-100 rounded-2xl flex items-center gap-3"><i class="fa fa-search"></i> Buscar no Histórico</button> <button onclick="mostrarAjuda()" class="w-full text-left px-4 py-4 hover:bg-gray-100 rounded-2xl flex items-center gap-3"><i class="fa fa-question-circle"></i> Ajuda</button> </div> </div> </div> <!-- Painel de Pastas --> <div id="foldersPanel" class="fixed inset-0 bg-black/50 z-50 hidden"> <div class="bg-white h-full w-full max-w-md ml-auto p-5 overflow-y-auto"> <div class="flex justify-between mb-6"> <h3 class="text-2xl font-bold text-primary">📁 Suas Pastas</h3> <button id="closeFolders" class="text-3xl text-gray-400 hover:text-gray-600">✕</button> </div> <button id="newFolderBtn" class="w-full bg-secondary text-white py-3 rounded-2xl mb-6 flex items-center justify-center gap-2"><i class="fa fa-plus"></i> Nova Pasta</button> <div id="foldersList" class="space-y-4"></div> </div> </div> <!-- Painel de Configurações --> <div id="configPanel" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4"> <div class="bg-white w-full max-w-sm rounded-3xl p-6 relative"> <button id="closeConfig" class="absolute top-4 right-4 text-3xl text-gray-400 hover:text-gray-600">✕</button> <h3 class="text-2xl font-bold text-primary mb-6">⚙️ Configurações</h3> <button id="limparChatBtn" class="w-full py-4 bg-yellow-50 border border-yellow-300 text-yellow-800 rounded-2xl mb-3">🧹 Limpar Chat</button> <button id="limparTudoBtn" class="w-full py-4 bg-red-50 border border-red-300 text-red-800 rounded-2xl">⚠️ Apagar Tudo</button> <div class="flex justify-between items-center mt-8"> <span class="text-lg">🔊 Voz para leitura</span> <input type="checkbox" id="usarVoz" checked class="w-5 h-5 accent-secondary"> </div> </div> </div> <script> let db, conhecimento = [], gravador, audioChunks = [], vozAtiva = true, isRecording = false; async function initDB() { return new Promise(resolve => { const req = indexedDB.open("ReggaeDB", 6); req.onupgradeneeded = e => { db = e.target.result; if (!db.objectStoreNames.contains("conhecimento")) { db.createObjectStore("conhecimento", { autoIncrement: true }); } }; req.onsuccess = e => { db = e.target.result; carregarConhecimento(); resolve(); }; req.onerror = () => resolve(); }); } function carregarConhecimento() { const tx = db.transaction("conhecimento", "readonly"); tx.objectStore("conhecimento").getAll().onsuccess = e => { conhecimento = e.target.result || []; }; } function salvarConhecimento(texto, tipo = "texto") { if (!texto?.trim()) return; const item = { texto, tipo, data: new Date() }; db.transaction("conhecimento", "readwrite").objectStore("conhecimento").add(item); conhecimento.push(item); } function calcularSimilaridade(query, texto) { const q = query.toLowerCase().trim(); const t = texto.toLowerCase(); if (t.includes(q)) return 12; const score = q.split(/\s+/).filter(p => p.length > 2 && t.includes(p)).length * 4; return score; } function melhorMatch(mensagem) { let melhor = { score: 0, texto: "" }; conhecimento.forEach(item => { const score = calcularSimilaridade(mensagem, item.texto); if (score > melhor.score) melhor = { score, texto: item.texto }; }); return melhor.score >= 4 ? melhor.texto : null; } function gerarResposta(msg) { const match = melhorMatch(msg); if (match) return `Encontrei isso: "${match}" 📚`; if (/oi|olá|bom dia|boa tarde|boa noite/.test(msg.toLowerCase())) return "Fala meu parceiro! Tô na paz 🔥"; return "Entendi! Guardei e tô aprendendo com você. Manda mais! 🚀"; } function adicionarMensagem(texto, remetente = "usuario", tipo = "texto", dados = null) { const chat = document.getElementById("chatArea"); const div = document.createElement("div"); div.className = remetente === "usuario" ? "chat-bubble-out" : "chat-bubble-in"; if (tipo === "texto") { div.innerHTML = `<p class="whitespace-pre-wrap">${texto}</p>`; if (remetente === "reggae") { const btn = document.createElement("button"); btn.className = "copiar-btn text-xs text-secondary mt-2 flex items-center gap-1"; btn.innerHTML = `<i class="fa fa-copy"></i> Copiar`; btn.addEventListener("click", () => navigator.clipboard.writeText(texto)); div.appendChild(btn); } } else if (tipo === "imagem") { div.innerHTML = `<img src="${dados}" class="rounded-2xl max-w-full mt-1">`; } else if (tipo === "audio") { div.innerHTML = `<div class="audio-player"><i class="fa fa-play-circle text-3xl text-secondary"></i><audio controls src="${dados}" class="w-full"></audio></div>`; } else if (tipo === "arquivo") { div.innerHTML = `<a href="${dados.url}" download="${dados.nome}" class="text-secondary underline flex items-center gap-2"><i class="fa fa-file"></i> ${dados.nome}</a>`; } chat.appendChild(div); chat.scrollTop = chat.scrollHeight; } function mostrarPensando() { const chat = document.getElementById("chatArea"); const div = document.createElement("div"); div.id = "pensando"; div.className = "chat-bubble-in italic text-gray-500"; div.textContent = "Reggae pensando..."; chat.appendChild(div); chat.scrollTop = chat.scrollHeight; return div; } async function enviarMensagem() { const input = document.getElementById("messageInput"); const texto = input.value.trim(); if (!texto) return; adicionarMensagem(texto, "usuario"); salvarConhecimento(texto); input.value = ""; input.style.height = "auto"; const pensando = mostrarPensando(); setTimeout(() => { pensando.remove(); const resposta = gerarResposta(texto); adicionarMensagem(resposta, "reggae"); if (vozAtiva) { const u = new SpeechSynthesisUtterance(resposta); u.lang = "pt-BR"; speechSynthesis.speak(u); } }, 800); } function enviarArquivos(arquivos) { for (const arq of arquivos) { const reader = new FileReader(); reader.onload = e => { let tipo = "arquivo"; if (arq.type.startsWith("image/")) tipo = "imagem"; else if (arq.type.startsWith("audio/")) tipo = "audio"; const dados = tipo === "arquivo" ? { nome: arq.name, url: e.target.result } : e.target.result; adicionarMensagem(arq.name, "usuario", tipo, dados); salvarConhecimento(`Arquivo: ${arq.name}`, tipo); }; reader.readAsDataURL(arq); } } async function iniciarPararGravacao() { const btn = document.getElementById("recordBtn"); if (!isRecording) { try { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); gravador = new MediaRecorder(stream); audioChunks = []; gravador.ondataavailable = e => audioChunks.push(e.data); gravador.onstop = () => { const blob = new Blob(audioChunks, { type: "audio/webm" }); const url = URL.createObjectURL(blob); adicionarMensagem("Áudio gravado", "usuario", "audio", url); salvarConhecimento("Gravação de áudio", "audio"); gravador.stream.getTracks().forEach(t => t.stop()); }; gravador.start(); isRecording = true; btn.classList.add("animate-pulse"); btn.innerHTML = `<i class="fa fa-stop text-red-500 text-2xl"></i>`; } catch (err) { alert("Erro ao acessar microfone."); } } else { gravador.stop(); isRecording = false; btn.classList.remove("animate-pulse"); btn.innerHTML = `<i class="fa fa-microphone text-2xl"></i>`; } } function exportarBackup() { const backup = { conhecimento, timestamp: new Date().toISOString() }; const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `reggae-backup-${new Date().toISOString().slice(0, 10)}.json`; a.click(); closeSideMenu(); } function buscarNoHistorico() { const termo = prompt("Digite o termo para buscar:"); if (!termo) return; const res = conhecimento.filter(k => k.texto.toLowerCase().includes(termo.toLowerCase())); alert(res.length ? res.map(r => r.texto).join("\n\n") : "Nada encontrado."); } function mostrarAjuda() { alert("Reggae v1.4\nTudo salvo localmente no seu navegador.\n\n✅ Envie textos, imagens, áudios e arquivos\n🎤 Grave áudio direto pelo microfone\n📁 Organize em pastas\n💾 Exporte backup JSON"); } function closeSideMenu() { document.getElementById("sideMenu").classList.add("hidden"); } function autoGrow() { const ta = document.getElementById("messageInput"); ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 128) + "px"; } window.addEventListener("load", () => { initDB(); const input = document.getElementById("messageInput"); input.addEventListener("input", autoGrow); input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviarMensagem(); } }); document.getElementById("sendBtn").addEventListener("click", enviarMensagem); document.getElementById("attachBtn").addEventListener("click", () => document.getElementById("fileInput").click()); document.getElementById("fileInput").addEventListener("change", e => { enviarArquivos(e.target.files); e.target.value = ""; }); document.getElementById("recordBtn").addEventListener("click", iniciarPararGravacao); document.getElementById("menuBtn").addEventListener("click", () => document.getElementById("sideMenu").classList.toggle("hidden")); document.getElementById("foldersBtn").addEventListener("click", () => document.getElementById("foldersPanel").classList.remove("hidden")); document.getElementById("configBtn").addEventListener("click", () => document.getElementById("configPanel").classList.remove("hidden")); document.getElementById("closeFolders").addEventListener("click", () => document.getElementById("foldersPanel").classList.add("hidden")); document.getElementById("closeConfig").addEventListener("click", () => document.getElementById("configPanel").classList.add("hidden")); document.getElementById("sideMenu").addEventListener("click", e => { if (e.target === document.getElementById("sideMenu")) closeSideMenu(); }); document.getElementById("newFolderBtn").addEventListener("click", () => { const nome = prompt("Nome da nova pasta:"); if (nome?.trim()) { const div = document.createElement("div"); div.className = "p-4 bg-white rounded-2xl shadow border-l-4 border-secondary"; div.innerHTML = `<h4 class="font-semibold">${nome.trim()}</h4><p class="text-xs text-gray-500">Pasta vazia</p>`; document.getElementById("foldersList").appendChild(div); } }); document.getElementById("limparChatBtn").addEventListener("click", () => { if (confirm("Limpar chat?")) { document.getElementById("chatArea").innerHTML = ""; document.getElementById("configPanel").classList.add("hidden"); adicionarMensagem("Chat limpo! Bora recomeçar 🔥", "reggae"); } }); document.getElementById("limparTudoBtn").addEventListener("click", () => { if (confirm("Apagar tudo? Isso remove todo o histórico salvo.")) { indexedDB.deleteDatabase("ReggaeDB"); location.reload(); } }); document.getElementById("usarVoz").addEventListener("change", e => vozAtiva = e.target.checked); adicionarMensagem("Fala meu parceiro! Tô pronto pra guardar tudo e te ajudar. Manda ver! 🚀", "reggae"); }); </script> </body> </html>
