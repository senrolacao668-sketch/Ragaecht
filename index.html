<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DiamanteBlack AI 💎</title>
    <style>
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a2e;
            --neon: #b44fff; --neon2: #7f00ff; --cyan: #00f0ff; --pink: #ff2d78;
            --text: #e8e0f8; --muted: #6b6080;
            --bubble-in: #1e1e30; --bubble-out: #2a1540;
            --border: #2e2060; --radius: 18px;
            --font-ui: 'Segoe UI', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-ui); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--neon2); border-radius: 4px; }

        header {
            background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10;
        }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; background: linear-gradient(90deg, var(--neon), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
        
        .status-badge {
            font-size: 0.65rem; color: var(--muted); background: var(--bg3); 
            padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 5px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff00; box-shadow: 0 0 8px #00ff00; }

        .btn-icon { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; }
        .btn-icon:hover { color: var(--neon); background: rgba(255,255,255,0.05); }

        #chatArea { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 85%; padding: 12px 14px; line-height: 1.5; font-size: 0.95rem; word-break: break-word; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bubble-in { background: var(--bubble-in); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) var(--radius) 4px; align-self: flex-start; }
        .bubble-in::before { content: ''; position: absolute; top: 0; left: -1px; width: 3px; height: 100%; background: linear-gradient(180deg, var(--neon), var(--neon2)); border-radius: 3px 0 0 3px; }
        .bubble-out { background: var(--bubble-out); border: 1px solid rgba(180,79,255,.3); border-radius: var(--radius) var(--radius) 4px var(--radius); align-self: flex-end; }
        
        .copy-btn { background: none; border: none; color: var(--muted); font-size: 0.7rem; cursor: pointer; display: block; margin-top: 4px; width: 100%; text-align: right; }
        .copy-btn:hover { color: var(--cyan); }
        footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 10px; flex-shrink: 0; }
        .input-row { display: flex; align-items: center; gap: 8px; max-width: 800px; margin: 0 auto; }
        
        .folder-pill {
            position: absolute; bottom: 65px; left: 10px; background: var(--bg3);
            border: 1px solid var(--border); color: var(--text); padding: 4px 10px;
            border-radius: 12px; font-size: 0.75rem; z-index: 5;
        }

        .input-box {
            flex: 1; background: var(--bg3); border: 1px solid var(--border);
            border-radius: 22px; padding: 0 14px; display: flex; align-items: center; min-height: 44px;
        }
        .input-box:focus-within { border-color: var(--neon2); }
        #messageInput { width: 100%; background: none; border: none; color: var(--text); font-size: 0.95rem; padding: 10px 0; resize: none; max-height: 100px; outline: none; }
        
        .send-btn { background: linear-gradient(135deg, var(--neon2), var(--pink)); border: none; border-radius: 50%; width: 40px; height: 40px; color: white; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: none; backdrop-filter: blur(4px); }
        .overlay.show { display: flex; align-items: center; justify-content: center; }
        .panel-right { margin-left: auto; width: min(300px, 85vw); height: 100%; background: var(--bg2); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .panel-center { width: min(350px, 90vw); background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin: auto; max-height: 90vh; overflow-y: auto; }

        .btn-full { width: 100%; border: none; border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-purple { background: linear-gradient(135deg, var(--neon2), var(--neon)); }
        .btn-red { background: linear-gradient(135deg, #880022, var(--pink)); }
        
        .folder-item { background: var(--bg3); padding: 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .folder-item b { color: var(--neon); cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="logo">💎 DIAMANTE BLACK</div>
            <div class="logo-sub">RAG Cloud · Mistral Free</div>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
            <div class="status-badge"><div class="dot"></div> Online</div>
            <button class="btn-icon" onclick="togglePanel('foldersPanel')">📁</button>
            <button class="btn-icon" onclick="togglePanel('configPanel')">⚙️</button>
        </div>
    </header>

    <main id="chatArea"></main>

    <footer style="position:relative;">
        <select id="activeFolderSelect" class="folder-pill" onchange="setActiveFolder(this.value)">
            <option value="">📂 Global (Todas)</option>        </select>

        <div class="input-row">
            <div class="input-box">
                <textarea id="messageInput" rows="1" placeholder="Pergunte ou ensine algo..."></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </footer>

    <!-- MODAL PASTAS -->
    <div class="overlay" id="foldersPanel">
        <div class="panel-right">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="color:var(--neon)">📁 Pastas</h2>
                <button class="btn-icon" onclick="togglePanel('foldersPanel')">✕</button>
            </div>
            <button class="btn-full btn-purple" onclick="criarPastaPrompt()">+ Nova Pasta</button>
            <div id="foldersList"></div>
        </div>
    </div>

    <!-- MODAL CONFIG -->
    <div class="overlay" id="configPanel">
        <div class="panel-center">
            <button class="btn-icon" style="position:absolute; right:15px; top:15px;" onclick="togglePanel('configPanel')">✕</button>
            <h2 style="color:var(--neon); margin-bottom:20px">⚙️ Config</h2>
            <button class="btn-full btn-purple" onclick="limparChat()">🧹 Limpar Tela</button>
            <button class="btn-full btn-red" onclick="resetTotal()">⚠️ Apagar Tudo</button>
            <p style="margin-top:15px; font-size:0.7rem; color:var(--muted);">
                Usando API gratuita HuggingFace (Mistral-7B).<br>
                Funciona em qualquer celular sem WebGPU.
            </p>
        </div>
    </div>

    <script>
        let db;
        let knowledgeBase = [];
        let folders = [];
        let activeFolderId = null;
        
        // Modelo gratuito do HuggingFace (não precisa de key para uso básico)
        const HF_MODEL = "mistralai/Mistral-7B-Instruct-v0.3";
        const HF_API = "https://api-inference.huggingface.co/models/" + HF_MODEL;

        /* ═══════════════════════════════════════════
           BANCO DE DADOS (INDEXEDDB)
           ═══════════════════════════════════════════ */
        function initDB() {            return new Promise(resolve => {
                const req = indexedDB.open('DiamanteDB_v5', 1);
                req.onupgradeneeded = e => {
                    const d = e.target.result;
                    if(!d.objectStoreNames.contains('knowledge')) d.createObjectStore('knowledge', { keyPath: 'id', autoIncrement: true });
                    if(!d.objectStoreNames.contains('folders')) d.createObjectStore('folders', { keyPath: 'id', autoIncrement: true });
                };
                req.onsuccess = e => {
                    db = e.target.result;
                    carregarDados().then(resolve);
                };
            });
        }

        function salvarDB(store, data) {
            return new Promise(resolve => {
                const tx = db.transaction(store, 'readwrite');
                tx.objectStore(store).add(data).onsuccess = e => resolve(e.target.result);
            });
        }

        function deletarDB(store, id) {
            return new Promise(resolve => {
                const tx = db.transaction(store, 'readwrite');
                tx.objectStore(store).delete(id).onsuccess = () => resolve();
            });
        }

        async function carregarDados() {
            const tx = db.transaction(['knowledge', 'folders'], 'readonly');
            tx.objectStore('knowledge').getAll().onsuccess = e => { knowledgeBase = e.target.result || []; };
            tx.objectStore('folders').getAll().onsuccess = e => { 
                folders = e.target.result || []; 
                renderFolders(); 
                renderFolderSelect();
            };
        }

        /* ═══════════════════════════════════════════
           IA VIA API GRATUITA (SEM WEBGPU)
           ═══════════════════════════════════════════ */
        async function pedirIA(pergunta, contextoRAG = "") {
            let prompt = "";
            if (contextoRAG) {
                prompt = `<s>[INST] Use APENAS o contexto abaixo para responder. Se não souber, diga que não sabe.\nContexto: ${contextoRAG}\nPergunta: ${pergunta} [/INST]`;
            } else {
                prompt = `<s>[INST] Responda de forma útil e direta em português: ${pergunta} [/INST]`;
            }

            try {                const response = await fetch(HF_API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        inputs: prompt,
                        parameters: { max_new_tokens: 300, temperature: 0.4 }
                    })
                });

                if (!response.ok) throw new Error("API ocupada ou indisponível");
                
                const data = await response.json();
                // A API retorna array com generated_text
                let texto = data[0]?.generated_text || "";
                
                // Limpa o prompt da resposta se vier junto
                if(texto.includes("[/INST]")) {
                    texto = texto.split("[/INST]").pop().trim();
                }
                
                return texto || "Sem resposta da IA.";
            } catch(e) {
                console.error(e);
                // Fallback inteligente caso a API falhe
                return buscarSimples(pergunta) + "\n\n_(IA Cloud temporariamente offline)_";
            }
        }

        /* ═══════════════════════════════════════════
           RAG LOCAL (BUSCA NA MEMÓRIA)
           ═══════════════════════════════════════════ */
        function buscarContexto(query) {
            if(!query) return "";
            const base = activeFolderId ? knowledgeBase.filter(k => k.folderId == activeFolderId) : knowledgeBase;
            const termos = query.toLowerCase().split(/\s+/);
            let melhores = [];

            base.forEach(doc => {
                if(!doc.texto) return;
                let score = 0;
                const txt = doc.texto.toLowerCase();
                termos.forEach(t => { if(txt.includes(t)) score += 10; });
                if(txt.includes(query)) score += 50;
                if(score > 0) melhores.push({score, texto: doc.texto});
            });

            return melhores.sort((a,b) => b.score - a.score).slice(0, 3).map(m => m.texto).join("\n\n");
        }

        function buscarSimples(pergunta) {            const ctx = buscarContexto(pergunta);
            return ctx ? `Encontrei na memória:\n"${ctx.substring(0, 200)}..."` : "Não tenho isso na memória ainda.";
        }

        /* ═══════════════════════════════════════════
           INTERFACE & CHAT
           ═══════════════════════════════════════════ */
        function addBubble(texto, tipo = 'bot') {
            const chat = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `bubble bubble-${tipo}`;
            div.innerHTML = `<div>${texto.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>')}</div>`;
            if(tipo === 'bot') div.innerHTML += `<button class="copy-btn" onclick="copiar(this)">📋 Copiar</button>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const inp = document.getElementById('messageInput');
            const txt = inp.value.trim();
            if(!txt) return;

            addBubble(txt, 'user');
            inp.value = '';
            
            // Salvar no DB local
            salvarDB('knowledge', { texto: txt, folderId: activeFolderId, data: new Date().toISOString() })
                .then(id => knowledgeBase.push({id, texto: txt, folderId: activeFolderId}));

            // Loading visual
            const loading = document.createElement('div');
            loading.className = 'bubble bubble-in';
            loading.style.opacity = '0.6';
            loading.innerText = '🧠 Processando na nuvem...';
            document.getElementById('chatArea').appendChild(loading);

            const contexto = buscarContexto(txt);
            const resp = await pedirIA(txt, contexto);
            
            loading.remove();
            addBubble(resp, 'bot');
        }

        document.getElementById('messageInput').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function copiar(btn) {
            navigator.clipboard.writeText(btn.parentElement.innerText.replace('📋 Copiar',''));
            btn.innerText = '✅';            setTimeout(() => btn.innerText = '📋 Copiar', 2000);
        }

        /* ═══════════════════════════════════════════
           PASTAS & UTILITÁRIOS
           ═══════════════════════════════════════════ */
        function togglePanel(id) { document.getElementById(id).classList.toggle('show'); }
        function limparChat() { document.getElementById('chatArea').innerHTML = ''; togglePanel('configPanel'); }
        function resetTotal() { 
            if(confirm("Apagar TUDO?")) { 
                indexedDB.deleteDatabase('DiamanteDB_v5'); 
                location.reload(); 
            } 
        }

        function renderFolders() {
            const list = document.getElementById('foldersList');
            list.innerHTML = '';
            folders.forEach(f => {
                const count = knowledgeBase.filter(k => k.folderId == f.id).length;
                const div = document.createElement('div');
                div.className = 'folder-item';
                div.innerHTML = `
                    <div><b>📁 ${f.nome}</b><br><small style="color:var(--muted)">${count} itens</small></div>
                    <button class="btn-icon" style="color:var(--pink)" onclick="deletarPasta(${f.id})">✕</button>
                `;
                list.appendChild(div);
            });
        }

        function renderFolderSelect() {
            const sel = document.getElementById('activeFolderSelect');
            sel.innerHTML = '<option value="">📂 Global (Todas)</option>';
            folders.forEach(f => sel.innerHTML += `<option value="${f.id}">📁 ${f.nome}</option>`);
        }

        function setActiveFolder(val) { activeFolderId = val ? parseInt(val) : null; }

        async function criarPastaPrompt() {
            const nome = prompt("Nome da Pasta:");
            if(nome) {
                const id = await salvarDB('folders', {nome, data: new Date().toISOString()});
                folders.push({id, nome});
                renderFolders();
                renderFolderSelect();
            }
        }

        async function deletarPasta(id) {
            if(confirm("Apagar pasta?")) {                await deletarDB('folders', id);
                folders = folders.filter(f => f.id !== id);
                renderFolders();
                renderFolderSelect();
            }
        }

        // INIT
        window.onload = async () => {
            await initDB();
            addBubble("💎 **DiamanteBlack Online.**\nUsando IA na nuvem (Mistral-7B). Funciona em qualquer celular!", 'bot');
        };
    </script>
</body>
</html>
